<style>
body{
  margin:0;
  height:100vh;
  background:url("https://files.catbox.moe/b1r7lz.jpg") center/cover no-repeat;
  overflow:hidden;
  font-family:sans-serif;
}

/* ICON */
.icon{
  position:absolute;
  width:72px;
  height:72px;
  border-radius:50%;
  cursor:pointer;
  object-fit:cover;
  transition:.25s;
}
.icon:hover{
  transform:scale(1.15);
}

/* MODAL BG */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(6px);
  z-index:999;
}

/* ENVELOPE */
.envelope{
  position:relative;
  width:420px;
  height:270px;
  perspective:1000px;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ffb6d9;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:.7s;
  z-index:3;
}

.body{
  position:absolute;
  width:100%;
  height:100%;
  background:#ffcce6;
  border-radius:18px;
  z-index:1;
}

/* LETTER */
.letter{
  position:absolute;
  width:85%;
  max-height:70%;
  overflow:auto;
  background:#fff0f6;
  top:50%;
  left:50%;
  transform:translate(-50%,20%);
  border-radius:14px;
  padding:25px;
  text-align:center;
  opacity:0;
  transition:.6s;
  z-index:2;

  font-family:'Playfair Display',serif;
  font-size:18px;
  line-height:1.6;
  color:#5a2a3a;
}

/* SCROLLBAR */
.letter::-webkit-scrollbar{
  width:6px;
}
.letter::-webkit-scrollbar-thumb{
  background:#ff66b2;
  border-radius:10px;
}

/* OPEN */
.open .flap{ transform:rotateX(180deg); }
.open .letter{
  transform:translate(-50%,-50%);
  opacity:1;
}

/* BUTTON */
.close{
  margin-top:18px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:#ff66b2;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* BOTTOM TEXT */
.bottom{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-family:'Great Vibes',cursive;
  font-size:64px;
  background:linear-gradient(45deg,#ff2d95,#ff66c4,#ff2d95);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 2px 6px rgba(0,0,0,.25),
    0 0 15px rgba(255,45,149,.5);
  z-index:10;
}

/* MOBILE */
@media(max-width:600px){

.icon{
  width:28px;
  height:28px;
}

.envelope{
  width:82vw;
  height:50vw;
}

.bottom{
  font-size:18px;
  margin-bottom: 0;
}

}
</style>
