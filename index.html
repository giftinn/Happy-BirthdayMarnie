<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Letters</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  background:url("https://files.catbox.moe/b1r7lz.jpg") center/cover no-repeat;
  overflow:hidden;
  font-family:sans-serif;
}

/* ICON */
.icon{
  position:absolute;
  width:72px;
  height:72px;
  border-radius:50%;
  cursor:pointer;
  object-fit:cover;
  transition:.25s;
}
.icon:hover{
  transform:scale(1.15);
}

/* MODAL BG */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(6px);
  z-index:999;
}

/* ENVELOPE */
.envelope{
  position:relative;
  width:420px;
  height:270px;
  perspective:1000px;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#ffb6d9;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:.7s;
  z-index:3;
}

.body{
  position:absolute;
  width:100%;
  height:100%;
  background:#ffcce6;
  border-radius:18px;
  z-index:1;
}

/* LETTER */
.letter{
  position:absolute;
  width:85%;
  max-height:70%;
  overflow:auto;
  background:#fff0f6;
  top:50%;
  left:50%;
  transform:translate(-50%,20%);
  border-radius:14px;
  padding:25px;
  text-align:center;
  opacity:0;
  transition:.6s;
  z-index:2;

  font-family:'Playfair Display',serif;
  font-size:18px;
  line-height:1.6;
  color:#5a2a3a;
}

/* SCROLLBAR */
.letter::-webkit-scrollbar{
  width:6px;
}
.letter::-webkit-scrollbar-thumb{
  background:#ff66b2;
  border-radius:10px;
}

/* OPEN */
.open .flap{ transform:rotateX(180deg); }
.open .letter{
  transform:translate(-50%,-50%);
  opacity:1;
}

/* BUTTON */
.close{
  margin-top:18px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:#ff66b2;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* BOTTOM TEXT */
.bottom{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-family:'Great Vibes',cursive;
  font-size:64px;
  background:linear-gradient(45deg,#ff2d95,#ff66c4,#ff2d95);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 2px 6px rgba(0,0,0,.25),
    0 0 15px rgba(255,45,149,.5);
  z-index:10;
}

/* MOBILE */
@media(max-width:600px){

.icon{
  width:28px;
  height:28px;
}

.envelope{
  width:82vw;
  height:50vw;
}

.bottom{
  font-size:18px;
  margin-bottom: 0;
}

}
</style>
</head>
<body>

<div id="icons"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="envelope" id="env">
    <div class="flap"></div>
    <div class="body"></div>

    <div class="letter">
      <div id="letterText"></div>
      <button class="close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div class="bottom">from all the angels and wings in your life. happiest birthday, marnie!</div>

<script>

/* LETTER TEXT */
const letters=[
"Letter 1 — kamu rumah.",
"Letter 2 — kamu tenang.",
"Letter 3 — kamu favorit.",
"Letter 4 — kamu alasan senyum.",
"Letter 5 — you're my peace.",
"Letter 6 — i adore you. teks panjang juga aman karena auto scroll.",
"Letter 7 — makasih ya.",
"Letter 8 — kamu manis.",
"Letter 9 — stay mine.",
"Letter 10 — my heart = you.",
"Letter 11 — kamu hangat.",
"Letter 12 — peluk sini.",
"Letter 13 — aku bangga.",
"Letter 14 — always you.",
"Letter 15 — lucky charmku.",
"Letter 16 — forever us.",
"Letter 17 — you're magic.",
"Letter 18 — i choose you.",
"Letter 19 — kamu indah.",
"Letter 20 — my love.",
"Letter 21 — stay close.",
"Letter 22 — i love you."
];

/* POSISI LOVE */
const positions=[
[20,40],[15,50],[20,60],
[30,30],[30,45],[30,55],[30,70],
[40,25],[40,40],[40,60],[40,75],
[50,30],[50,70],
[60,35],[60,65],
[70,40],[70,60],
[80,45],[80,55],
[85,50],
[55,50],
[65,50]
];

/* ICON FILES */
const icons=[
"https://files.catbox.moe/43o1po.JPG",
"https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG",
"https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG",
"https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG","https://files.catbox.moe/43o1po.JPG"
];

const box=document.getElementById("icons");

positions.forEach((p,i)=>{
 const img=document.createElement("img");
 img.src=icons[i] || icons[0];
 img.className="icon";
 img.style.top=p[0]+"vh";
 img.style.left=p[1]+"vw";
 img.onclick=()=>openLetter(i);
 box.appendChild(img);
});

/* OPEN */
function openLetter(i){
 document.getElementById("letterText").innerText=letters[i];
 const modal=document.getElementById("modal");
 const env=document.getElementById("env");
 modal.style.display="flex";
 setTimeout(()=>env.classList.add("open"),60);
}

/* CLOSE */
function closeModal(){
 const modal=document.getElementById("modal");
 const env=document.getElementById("env");
 env.classList.remove("open");
 setTimeout(()=>modal.style.display="none",500);
}
</script>

</body>
</html>
